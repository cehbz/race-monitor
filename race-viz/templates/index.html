<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Monitor Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            line-height: 1.6;
        }

        .container { max-width: 1800px; margin: 0 auto; padding: 20px; }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 5px; }
        .subtitle { color: #8b949e; font-size: 14px; }

        #race-list {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 30px;
            max-height: 600px;
            overflow-y: auto;
        }

        .race-item {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: background 0.15s;
        }
        .race-item:last-child { border-bottom: none; }
        .race-item:hover { background: #1c2128; }
        .race-item.selected { background: #21262d; border-left: 3px solid #58a6ff; }
        .race-item.selected:hover { background: #1c2128; }

        .race-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; color: #e6edf3; }
        .race-hash { font-size: 11px; color: #6e7681; font-family: monospace; margin-bottom: 4px; }
        .race-meta {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .race-meta span { display: inline-flex; align-items: center; gap: 4px; }

        #visualization { display: none; }
        #visualization.active { display: block; }

        .chart-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #e6edf3; }
        .chart-info { font-size: 12px; color: #8b949e; font-weight: 400; margin-left: 10px; }

        .loading { text-align: center; padding: 40px; color: #8b949e; }

        .error {
            background: #2d1519;
            border: 1px solid #da3633;
            color: #f85149;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }
        .stat-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #e6edf3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .stat-value.multiline { font-size: 14px; white-space: normal; word-break: break-word; }
        .stat-value.mono { font-family: monospace; font-size: 12px; white-space: normal; word-break: break-all; }

        .analysis-stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-mini {
            flex: 1;
            min-width: 120px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .stat-mini .stat-label { font-size: 11px; }
        .stat-mini .stat-value { font-size: 18px; }

        .peer-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .peer-table th {
            text-align: left;
            padding: 8px;
            border-bottom: 2px solid #30363d;
            color: #8b949e;
            font-weight: 600;
            font-size: 12px;
        }
        .peer-table td { padding: 8px; border-bottom: 1px solid #30363d; font-size: 13px; }
        .peer-table tr:last-child td { border-bottom: none; }
        .peer-table .num { text-align: right; font-variant-numeric: tabular-nums; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.self { background: rgba(88, 166, 255, 0.2); color: #58a6ff; }
        .badge.seeder { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
        .badge.leecher { background: rgba(121, 192, 255, 0.2); color: #79c0ff; }
        .badge.competitive { background: rgba(248, 81, 73, 0.2); color: #f85149; }
        .beat-us { color: #3fb950; font-weight: 600; font-size: 12px; }
        .self-row td { background: rgba(88, 166, 255, 0.05); }
        .seeder-row td { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Race Monitor Dashboard</h1>
            <div class="subtitle">eBPF uprobe architecture &mdash; libtorrent we_have / incoming_have events</div>
        </header>

        <div id="race-list">
            <div class="loading">Loading races...</div>
        </div>

        <div id="visualization"></div>
    </div>

    <script>
        let selectedRaceId = null;

        function showAllRaces() {
            document.querySelectorAll('.race-item').forEach(item => {
                item.style.display = 'block';
                item.classList.remove('selected');
                item.onclick = function() { loadRaceData(parseInt(this.dataset.raceId)); };
            });
            document.getElementById('visualization').classList.remove('active');
            selectedRaceId = null;
        }

        function parseTS(ts) {
            if (!ts) return null;
            const d = new Date(ts);
            return isNaN(d.getTime()) ? null : d;
        }

        const commonLayout = {
            paper_bgcolor: '#161b22',
            plot_bgcolor: '#0d1117',
            font: { color: '#e6edf3', family: 'monospace' },
            margin: { l: 80, r: 40, t: 20, b: 60 },
            hovermode: 'closest',
            xaxis: { gridcolor: '#30363d', zerolinecolor: '#30363d', title: 'Elapsed Time (seconds)' },
            yaxis: { gridcolor: '#30363d', zerolinecolor: '#30363d' },
            legend: { bgcolor: '#0d1117', bordercolor: '#30363d', borderwidth: 1 }
        };

        const plotlyConfig = { responsive: true, displayModeBar: true, displaylogo: false, scrollZoom: true };

        const peerColors = [
            '#3fb950', '#d29922', '#f85149', '#a371f7', '#f778ba',
            '#79c0ff', '#ffa657', '#7ee787', '#d2a8ff', '#ff7b72',
            '#56d4dd', '#e3b341', '#db61a2', '#6cb6ff', '#c9d1d9',
            '#b392f0', '#fddf68', '#f692ce', '#8ddb8c', '#e09b13'
        ];

        // --- Race list with async count enrichment ---

        async function loadRaces() {
            try {
                const response = await fetch('/api/races');
                const races = await response.json();
                const container = document.getElementById('race-list');

                if (races.length === 0) {
                    container.innerHTML = '<div class="loading">No races found. Start a download while race-monitor daemon is running.</div>';
                    return;
                }

                container.innerHTML = '';
                races.forEach(race => {
                    const item = document.createElement('div');
                    item.className = 'race-item';
                    item.dataset.raceId = race.id;
                    item.onclick = () => loadRaceData(race.id);

                    const startDate = parseTS(race.started_at);
                    const status = race.completed_at ? 'Done' : 'Running';
                    const shortHash = race.info_hash ? race.info_hash.slice(0, 12) + '\u2026' : '';

                    item.innerHTML = `
                        <div class="race-name">${status} &mdash; ${race.name || race.info_hash || 'Unknown'}</div>
                        ${shortHash ? `<div class="race-hash" title="${race.info_hash}">${shortHash}</div>` : ''}
                        <div class="race-meta">
                            <span>${startDate ? startDate.toLocaleString() : race.started_at}</span>
                            <span>${formatBytes(race.size)}</span>
                            <span>${race.piece_count} pieces</span>
                            <span data-count="peers-${race.id}">&mdash; peers</span>
                            <span data-count="events-${race.id}">&mdash; events</span>
                        </div>
                    `;
                    container.appendChild(item);
                });

                // Async enrichment: fetch counts in background
                const ids = races.map(r => r.id);
                try {
                    const countsResp = await fetch(`/api/races/counts?ids=${ids.join(',')}`);
                    const counts = await countsResp.json();
                    for (const [raceId, data] of Object.entries(counts)) {
                        const peersEl = document.querySelector(`[data-count="peers-${raceId}"]`);
                        const eventsEl = document.querySelector(`[data-count="events-${raceId}"]`);
                        if (peersEl) peersEl.textContent = `${data.peer_count} peers`;
                        if (eventsEl) eventsEl.textContent = `${numberWithCommas(data.event_count)} events`;
                    }
                } catch (e) {
                    console.warn('Failed to load race counts:', e);
                }
            } catch (error) {
                document.getElementById('race-list').innerHTML =
                    `<div class="error">Error loading races: ${error.message}</div>`;
            }
        }

        // --- Race detail view ---

        async function loadRaceData(raceId) {
            selectedRaceId = raceId;

            document.querySelectorAll('.race-item').forEach(item => {
                const itemRaceId = parseInt(item.dataset.raceId);
                if (itemRaceId === raceId) {
                    item.classList.add('selected');
                    item.onclick = showAllRaces;
                } else {
                    item.style.display = 'none';
                }
            });

            const viz = document.getElementById('visualization');
            viz.classList.add('active');
            viz.innerHTML = '<div class="loading">Loading race data...</div>';

            try {
                const raceResp = await fetch(`/api/race/${raceId}`);
                const raceData = await raceResp.json();

                if (raceData.error) {
                    viz.innerHTML = `<div class="error">${raceData.error}</div>`;
                    return;
                }

                viz.innerHTML = `
                    <div class="stats-grid" id="race-stats"></div>

                    <div class="chart-container">
                        <div class="chart-title">
                            Race Progress &mdash; Per-Peer Completion
                            <span class="chart-info">Click legend entries to show/hide. Scroll to zoom.</span>
                        </div>
                        <div id="peer-progress-chart"><div class="loading">Loading peer data...</div></div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">Piece Completion Progress</div>
                        <div id="progress-chart"></div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">Event Activity (events per second)</div>
                        <div id="event-chart"></div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">
                            Race Participants
                            <span class="chart-info">All peers ordered by finish time</span>
                        </div>
                        <div id="peers-table-section"><div class="loading">Loading peer data...</div></div>
                    </div>

                `;

                displayRaceStats(raceData);
                renderTimelineCharts(raceData);

                const [progressResp, peersResp] = await Promise.all([
                    fetch(`/api/race/${raceId}/peer_progress`),
                    fetch(`/api/race/${raceId}/peers`)
                ]);

                const progressData = await progressResp.json();
                const peersData = await peersResp.json();

                renderPeerProgressChart(progressData, raceData.race.piece_count);
                renderPeersTable(peersData);

            } catch (error) {
                viz.innerHTML = `<div class="error">Error loading race data: ${error.message}</div>`;
            }
        }

        // --- Charts ---

        function renderTimelineCharts(data) {
            const { race, timeline } = data;
            const times = timeline.map(t => t.elapsed_sec);

            let cumulative = 0;
            const cumulativePieces = timeline.map(t => {
                cumulative += (t.piece_received || 0);
                return cumulative;
            });

            Plotly.newPlot('progress-chart', [{
                x: times, y: cumulativePieces,
                mode: 'lines', name: 'Pieces Completed',
                line: { color: '#58a6ff', width: 2 },
                fill: 'tozeroy', fillcolor: 'rgba(88, 166, 255, 0.1)',
                hovertemplate: '%{y} pieces at %{x}s<extra></extra>'
            }, {
                x: [times[0] || 0, times[times.length - 1] || 1],
                y: [race.piece_count, race.piece_count],
                mode: 'lines', name: 'Total Pieces',
                line: { color: '#8b949e', width: 1, dash: 'dot' },
                hoverinfo: 'skip'
            }], {
                ...commonLayout,
                yaxis: { ...commonLayout.yaxis, title: 'Pieces Completed' }
            }, plotlyConfig);

            Plotly.newPlot('event-chart', [
                {
                    x: times, y: timeline.map(t => t.piece_received || 0),
                    mode: 'lines', name: 'Piece Received (we_have)',
                    line: { width: 0 }, fillcolor: 'rgba(86, 211, 100, 0.5)',
                    fill: 'tozeroy', stackgroup: 'one'
                },
                {
                    x: times, y: timeline.map(t => t.have_count || 0),
                    mode: 'lines', name: 'Peer Have (incoming_have)',
                    line: { width: 0 }, fillcolor: 'rgba(88, 166, 255, 0.5)',
                    fill: 'tozeroy', stackgroup: 'one'
                }
            ], {
                ...commonLayout,
                yaxis: { ...commonLayout.yaxis, title: 'Events per Second' }
            }, plotlyConfig);
        }

        function renderPeerProgressChart(data, pieceCount) {
            const container = document.getElementById('peer-progress-chart');
            if (!data.self && data.peers.length === 0) {
                container.innerHTML = '<div class="loading">No peer progress data available.</div>';
                return;
            }

            // Check if any peers have actual per-piece tracking data
            const peersWithData = data.peers.filter(p => p.elapsed_secs && p.elapsed_secs.length > 0);
            const seedersOnly = peersWithData.length === 0 && data.peers.length > 0;

            if (seedersOnly && data.self) {
                // Pure download: only self curve, all peers are seeders
                container.innerHTML = `
                    <div style="color: #8b949e; font-size: 13px; margin-bottom: 12px;">
                        All ${data.peers.length} peers are seeders (used BITFIELD/HAVE-ALL at connect time).
                        Per-piece tracking requires leecher peers that send individual HAVE messages.
                    </div>
                    <div id="peer-progress-chart-plot"></div>
                `;
            }

            const plotTarget = seedersOnly ? 'peer-progress-chart-plot' : 'peer-progress-chart';

            const traces = [];
            if (data.self) {
                traces.push({
                    x: data.self.elapsed_secs, y: data.self.completion_pcts,
                    mode: 'lines', name: 'Us',
                    line: { color: '#58a6ff', width: 3 },
                    hovertemplate: 'Us: %{y:.1f}% at %{x}s<extra></extra>'
                });
            }

            // Only add peers that have actual data to the chart
            peersWithData.forEach((peer, idx) => {
                const color = peerColors[idx % peerColors.length];
                traces.push({
                    x: peer.elapsed_secs, y: peer.completion_pcts,
                    mode: 'lines', name: peer.label,
                    line: { color: color, width: 1 }, opacity: 0.6,
                    hovertemplate: peer.label + ': %{y:.1f}% at %{x}s<extra></extra>',
                    visible: idx < 30 ? true : 'legendonly'
                });
            });

            if (!seedersOnly) container.innerHTML = '';
            Plotly.newPlot(plotTarget, traces, {
                ...commonLayout,
                yaxis: { ...commonLayout.yaxis, title: 'Completion %', range: [0, 105] },
                xaxis: { ...commonLayout.xaxis, title: 'Elapsed Time (seconds)' },
                hovermode: 'x unified',
                legend: {
                    ...commonLayout.legend,
                    y: 1, yanchor: 'top', x: 1.02, xanchor: 'left',
                    font: { size: 10, color: '#8b949e' }
                }
            }, plotlyConfig);
        }

        // --- Unified peers table ---

        function renderPeersTable(data) {
            const container = document.getElementById('peers-table-section');
            const participants = data.participants || [];

            if (participants.length === 0) {
                container.innerHTML = '<div class="loading">No participants found for this race.</div>';
                return;
            }

            const seeders = participants.filter(p => p.type === 'seeder').length;
            const leechers = participants.filter(p => p.type === 'leecher').length;
            const beatUs = participants.filter(p => p.beat_us && p.type !== 'self').length;

            let html = `
                <div class="analysis-stats">
                    <div class="stat-mini">
                        <div class="stat-label">Participants</div>
                        <div class="stat-value">${participants.length}</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-label">Seeders</div>
                        <div class="stat-value" style="color: #3fb950">${seeders}</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-label">Leechers</div>
                        <div class="stat-value" style="color: #79c0ff">${leechers}</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-label">Beat Us</div>
                        <div class="stat-value" style="color: #d29922">${beatUs}</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-label">Our Finish</div>
                        <div class="stat-value">${data.our_finish_sec != null ? formatDuration(data.our_finish_sec) : '\u2014'}</div>
                    </div>
                </div>
            `;

            html += `
                <table class="peer-table">
                    <thead>
                        <tr>
                            <th class="num">#</th>
                            <th>IP</th>
                            <th class="num">Port</th>
                            <th>Client</th>
                            <th>Type</th>
                            <th class="num">Pieces</th>
                            <th class="num">Finish Time</th>
                            <th>vs Us</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            participants.forEach((p, idx) => {
                const isSelf = p.type === 'self';
                const isSeeder = p.type === 'seeder';
                const rowClass = isSelf ? 'self-row' : (isSeeder ? 'seeder-row' : '');
                const ip = isSelf ? '(self)' : (p.ip || '\u2014');
                const port = isSelf ? '\u2014' : (p.port || '\u2014');
                const client = isSelf ? '\u2014' : (p.client || '\u2014');

                let typeBadge;
                if (isSelf) typeBadge = '<span class="badge self">Self</span>';
                else if (isSeeder) typeBadge = '<span class="badge seeder">Seeder</span>';
                else typeBadge = '<span class="badge leecher">Leecher</span>';

                let finishStr;
                if (p.finish_sec === 0 && isSeeder) finishStr = '\u2014';
                else if (p.finish_sec != null) finishStr = formatDuration(p.finish_sec);
                else finishStr = '\u2014';

                let vsUs = '\u2014';
                if (isSelf) vsUs = '';
                else if (isSeeder) vsUs = '';
                else if (p.beat_us) vsUs = '<span class="beat-us">\u2713 faster</span>';
                else if (p.finish_sec != null && data.our_finish_sec != null)
                    vsUs = '<span style="color: #8b949e">slower</span>';

                html += `
                    <tr class="${rowClass}">
                        <td class="num">${idx + 1}</td>
                        <td><code>${ip}</code></td>
                        <td class="num">${port}</td>
                        <td>${client}</td>
                        <td>${typeBadge}</td>
                        <td class="num">${p.pieces}</td>
                        <td class="num">${finishStr}</td>
                        <td>${vsUs}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // --- Stats ---

        function displayRaceStats(data) {
            const { race, timeline, peer_count } = data;
            const statsContainer = document.getElementById('race-stats');

            const totalPieceReceived = timeline.reduce((sum, t) => sum + (t.piece_received || 0), 0);
            const totalHave = timeline.reduce((sum, t) => sum + (t.have_count || 0), 0);
            const totalEvents = totalPieceReceived + totalHave;

            let duration = 'Unknown';
            const startDate = parseTS(race.started_at);
            const endDate = parseTS(race.completed_at);
            if (startDate && endDate) {
                duration = formatDuration((endDate - startDate) / 1000);
            } else if (timeline.length >= 2) {
                const last = timeline[timeline.length - 1];
                if (last) duration = formatDuration(last.elapsed_sec);
            }

            const infoHash = race.info_hash || '';

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Race Name</div>
                    <div class="stat-value multiline">${race.name || 'Unknown'}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Info Hash</div>
                    <div class="stat-value mono">${infoHash}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Size</div>
                    <div class="stat-value">${formatBytes(race.size)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pieces</div>
                    <div class="stat-value">${totalPieceReceived} / ${race.piece_count}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value">${duration}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">eBPF Peers</div>
                    <div class="stat-value">${peer_count}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value">${numberWithCommas(totalEvents)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-value">${race.completed_at ? 'Complete' : 'Running'}</div>
                </div>
            `;
        }

        // --- Utilities ---

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDuration(seconds) {
            if (!seconds || seconds < 0) return 'Unknown';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function numberWithCommas(x) {
            if (x == null) return '0';
            return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function shortHex(connPtr) {
            if (!connPtr) return '';
            const s = connPtr.replace(/^0x/, '');
            return s.length > 8 ? '\u2026' + s.slice(-8) : s;
        }

        // --- SSE ---

        function connectSSE() {
            const eventSource = new EventSource('/api/events');
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'race_added' && !selectedRaceId) {
                        loadRaces();
                    }
                } catch (e) { /* keepalive comments */ }
            };
            eventSource.onerror = function() {
                console.log('SSE connection error, will auto-reconnect...');
            };
            return eventSource;
        }

        // --- Init ---
        loadRaces();
        const sse = connectSSE();
    </script>
</body>
</html>
