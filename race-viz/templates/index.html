<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Monitor Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            line-height: 1.6;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 14px;
        }

        #race-list {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 30px;
            max-height: 600px;
            overflow-y: auto;
        }

        .race-item {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: background 0.15s;
        }

        .race-item:last-child {
            border-bottom: none;
        }

        .race-item:hover {
            background: #1c2128;
        }

        .race-item.selected {
            background: #21262d;
            border-left: 3px solid #58a6ff;
        }

        .race-item.selected:hover {
            background: #1c2128;
        }

        .race-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            color: #e6edf3;
        }

        .race-meta {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .race-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        #visualization {
            display: none;
        }

        #visualization.active {
            display: block;
        }

        .chart-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e6edf3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .error {
            background: #2d1519;
            border: 1px solid #da3633;
            color: #f85149;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #e6edf3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stat-value.multiline {
            font-size: 14px;
            white-space: normal;
            word-break: break-word;
        }

        .peer-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .peer-table th {
            text-align: left;
            padding: 8px;
            border-bottom: 2px solid #30363d;
            color: #8b949e;
            font-weight: 600;
            font-size: 12px;
        }

        .peer-table td {
            padding: 8px;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
        }

        .peer-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Race Monitor Dashboard</h1>
            <div class="subtitle">eBPF uprobe architecture &mdash; libtorrent we_have / incoming_have events</div>
        </header>

        <div id="race-list">
            <div class="loading">Loading races...</div>
        </div>

        <div id="visualization"></div>
    </div>

    <script>
        let selectedRaceId = null;

        // Restore full race list view
        function showAllRaces() {
            document.querySelectorAll('.race-item').forEach(item => {
                item.style.display = 'block';
                item.classList.remove('selected');
                item.onclick = function() {
                    const raceId = parseInt(this.dataset.raceId);
                    loadRaceData(raceId);
                };
            });

            document.getElementById('visualization').classList.remove('active');
            selectedRaceId = null;
        }

        // Parse RFC 3339 timestamp (e.g. "2026-02-09T05:18:37.753Z") into Date.
        function parseTS(ts) {
            if (!ts) return null;
            const d = new Date(ts);
            return isNaN(d.getTime()) ? null : d;
        }

        // Fetch and display race list
        async function loadRaces() {
            try {
                const response = await fetch('/api/races');
                const races = await response.json();

                const container = document.getElementById('race-list');

                if (races.length === 0) {
                    container.innerHTML = '<div class="loading">No races found. Start a download while race-monitor daemon is running.</div>';
                    return;
                }

                container.innerHTML = '';

                races.forEach(race => {
                    const item = document.createElement('div');
                    item.className = 'race-item';
                    item.dataset.raceId = race.id;
                    item.onclick = () => loadRaceData(race.id);

                    const startDate = parseTS(race.started_at);
                    const status = race.completed_at ? 'Done' : 'Running';

                    item.innerHTML = `
                        <div class="race-name">${status} &mdash; ${race.name || race.hash}</div>
                        <div class="race-meta">
                            <span>${startDate ? startDate.toLocaleString() : race.started_at}</span>
                            <span>${formatBytes(race.size)}</span>
                            <span>${race.piece_count} pieces</span>
                            <span>${race.peer_count} peers</span>
                            <span>${race.event_count} events</span>
                        </div>
                    `;

                    container.appendChild(item);
                });
            } catch (error) {
                document.getElementById('race-list').innerHTML =
                    `<div class="error">Error loading races: ${error.message}</div>`;
            }
        }

        // Load detailed race data and visualize
        async function loadRaceData(raceId) {
            selectedRaceId = raceId;

            document.querySelectorAll('.race-item').forEach(item => {
                const itemRaceId = parseInt(item.dataset.raceId);
                if (itemRaceId === raceId) {
                    item.classList.add('selected');
                    item.onclick = showAllRaces;
                } else {
                    item.style.display = 'none';
                }
            });

            const viz = document.getElementById('visualization');
            viz.classList.add('active');
            viz.innerHTML = '<div class="loading">Loading race data...</div>';

            try {
                const response = await fetch(`/api/race/${raceId}`);
                const data = await response.json();

                if (data.error) {
                    viz.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                visualizeRace(data, raceId);
            } catch (error) {
                viz.innerHTML = `<div class="error">Error loading race data: ${error.message}</div>`;
            }
        }

        // Visualize race data with Plotly
        function visualizeRace(data, raceId) {
            const { race, timeline, peers, events } = data;

            // Rebuild visualization container
            document.getElementById('visualization').innerHTML = `
                <div class="stats-grid" id="race-stats"></div>

                <div class="chart-container">
                    <div class="chart-title">Piece Completion Progress</div>
                    <div id="progress-chart"></div>
                </div>

                <div class="chart-container">
                    <div class="chart-title">Event Activity (events per 5-second window)</div>
                    <div id="event-chart"></div>
                </div>

                <div class="chart-container">
                    <div class="chart-title">Peer Statistics</div>
                    <table class="peer-table" id="peer-table">
                        <thead>
                            <tr>
                                <th>IP</th>
                                <th>Port</th>
                                <th>Client</th>
                                <th>Country</th>
                                <th>Progress</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            `;

            displayRaceStats(race, timeline, events);
            loadAndDisplayPeers(raceId);

            // Calculate start time
            const raceStart = parseTS(race.started_at);
            const startTime = timeline.length > 0 ? parseTS(timeline[0].ts) : raceStart;

            // Prepare timeline data for charts
            const times = timeline.map(t => {
                const d = parseTS(t.ts);
                return d && startTime ? (d - startTime) / 1000 : 0;
            });

            // Layout configuration
            const layout = {
                paper_bgcolor: '#161b22',
                plot_bgcolor: '#0d1117',
                font: { color: '#e6edf3', family: 'monospace' },
                margin: { l: 80, r: 40, t: 20, b: 60 },
                hovermode: 'closest',
                xaxis: {
                    gridcolor: '#30363d',
                    zerolinecolor: '#30363d',
                    title: 'Elapsed Time (seconds)'
                },
                yaxis: {
                    gridcolor: '#30363d',
                    zerolinecolor: '#30363d'
                },
                legend: {
                    bgcolor: '#0d1117',
                    bordercolor: '#30363d',
                    borderwidth: 1
                }
            };

            const config = {
                responsive: true,
                displayModeBar: true,
                displaylogo: false
            };

            // Piece completion progress (cumulative we_have over time)
            let cumulative = 0;
            const cumulativePieces = timeline.map(t => {
                cumulative += (t.piece_received || 0);
                return cumulative;
            });

            Plotly.newPlot('progress-chart', [{
                x: times,
                y: cumulativePieces,
                mode: 'lines',
                name: 'Pieces Completed',
                line: { color: '#58a6ff', width: 2 },
                fill: 'tozeroy',
                fillcolor: 'rgba(88, 166, 255, 0.1)',
                hovertemplate: '%{y} pieces at %{x:.1f}s<extra></extra>'
            }, {
                x: [times[0] || 0, times[times.length - 1] || 1],
                y: [race.piece_count, race.piece_count],
                mode: 'lines',
                name: 'Total Pieces',
                line: { color: '#8b949e', width: 1, dash: 'dot' },
                hoverinfo: 'skip'
            }], {
                ...layout,
                yaxis: { ...layout.yaxis, title: 'Pieces Completed' }
            }, config);

            // Event activity chart (stacked area)
            const eventTraces = [
                {
                    x: times,
                    y: timeline.map(t => t.piece_received || 0),
                    mode: 'lines',
                    name: 'Piece Received (we_have)',
                    line: { width: 0 },
                    fillcolor: 'rgba(86, 211, 100, 0.5)',
                    fill: 'tozeroy',
                    stackgroup: 'one'
                },
                {
                    x: times,
                    y: timeline.map(t => t.have_count || 0),
                    mode: 'lines',
                    name: 'Peer Have (incoming_have)',
                    line: { width: 0 },
                    fillcolor: 'rgba(88, 166, 255, 0.5)',
                    fill: 'tozeroy',
                    stackgroup: 'one'
                }
            ];

            Plotly.newPlot('event-chart', eventTraces, {
                ...layout,
                yaxis: { ...layout.yaxis, title: 'Event Count' }
            }, config);
        }

        // Load peer data from the new /api/race/<id>/peers endpoint
        async function loadAndDisplayPeers(raceId) {
            try {
                const response = await fetch(`/api/race/${raceId}/peers`);
                const peers = await response.json();
                displayPeersTable(peers);
            } catch (error) {
                console.error('Error loading peers:', error);
                const tbody = document.querySelector('#peer-table tbody');
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#f85149">Error loading peer data</td></tr>';
                }
            }
        }

        // Display peer statistics table with real peer data
        function displayPeersTable(peers) {
            const tbody = document.querySelector('#peer-table tbody');
            if (!tbody) return;

            tbody.innerHTML = '';

            if (!peers || peers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8b949e">No peer data</td></tr>';
                return;
            }

            peers.forEach(peer => {
                const progressPercent = peer.progress ? (peer.progress * 100).toFixed(1) : '0.0';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${peer.ip}</td>
                    <td>${peer.port}</td>
                    <td>${peer.client || 'Unknown'}</td>
                    <td>${peer.country || 'Unknown'}</td>
                    <td>${progressPercent}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Display race statistics
        function displayRaceStats(race, timeline, events) {
            const statsContainer = document.getElementById('race-stats');

            const totalPieceReceived = timeline.reduce((sum, t) => sum + (t.piece_received || 0), 0);
            const totalHave = timeline.reduce((sum, t) => sum + (t.have_count || 0), 0);
            const totalEvents = totalPieceReceived + totalHave;

            let duration = 'Unknown';
            const startDate = parseTS(race.started_at);
            const endDate = parseTS(race.completed_at);
            if (startDate && endDate) {
                duration = formatDuration((endDate - startDate) / 1000);
            } else if (timeline.length >= 2) {
                const first = parseTS(timeline[0].ts);
                const last = parseTS(timeline[timeline.length - 1].ts);
                if (first && last) duration = formatDuration((last - first) / 1000);
            }

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Race Name</div>
                    <div class="stat-value multiline">${race.name || 'Unknown'}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Size</div>
                    <div class="stat-value">${formatBytes(race.size)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pieces</div>
                    <div class="stat-value">${totalPieceReceived} / ${race.piece_count}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value">${duration}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Peer Have Events</div>
                    <div class="stat-value">${totalHave}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value">${totalEvents}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-value">${race.completed_at ? 'Complete' : 'Running'}</div>
                </div>
            `;
        }

        // Utility: Format bytes
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Utility: Format duration
        function formatDuration(seconds) {
            if (!seconds || seconds < 0) return 'Unknown';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        // Server-Sent Events for real-time updates
        function connectSSE() {
            const eventSource = new EventSource('/api/events');

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'race_added') {
                        console.log('New race added, refreshing list...');
                        if (!selectedRaceId) {
                            loadRaces();
                        }
                    }
                } catch (e) {
                    // Ignore parsing errors (keepalive comments, etc.)
                }
            };

            eventSource.onerror = function(error) {
                console.log('SSE connection error, will auto-reconnect...');
            };

            return eventSource;
        }

        // Initialize
        loadRaces();
        const sse = connectSSE();
    </script>
</body>
</html>
